{#{% extends 'base_user.html' %}#}
{% extends 'base_user.html' %}

{% block title %}登录 - 微博话题分析系统{% endblock %}

{% block content %}
<div class="card auth-card border-0">
    <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle shadow-sm mb-3"
                 style="width: 64px; height: 64px; background: linear-gradient(135deg, #38bdf8, #bae6fd);">
                <svg width="32" height="32" fill="#fff" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            </div>
            <h3 class="font-weight-bold text-dark mb-1" style="font-size: 24px;">欢迎回来</h3>
            <p class="text-secondary small">微博话题舆情数据可视化系统</p>
        </div>

        <form id="loginForm" method="POST" action="/user/login">
            <div class="form-group mb-3">
                <input name="username" class="form-control" type="text" placeholder="👤 请输入用户名" value="lqy" required>
            </div>
            <div class="form-group mb-4">
                <input name="password" class="form-control" type="password" placeholder="🔒 请输入密码" value="lqy123" required>
            </div>

            <div class="puzzle-captcha-wrap" id="loginCaptcha">
                <div class="puzzle-img-box">
                    <canvas id="puzzleBg"></canvas>
                    <canvas id="puzzlePiece"></canvas>
                    <button type="button" class="puzzle-refresh" title="换一张">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    </button>
                </div>
                <div class="puzzle-slider">
                    <div class="puzzle-slider-bg"></div>
                    <div class="puzzle-slider-text">向右拖动滑块验证</div>
                    <div class="puzzle-slider-btn">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    </div>
                </div>
            </div>

            <button type="submit" id="loginSubmitBtn" class="btn btn-block text-white btn-custom mt-2"
                    style="background: linear-gradient(135deg, #0ea5e9, #0284c7); box-shadow: 0 6px 15px rgba(14, 165, 233, 0.3);">
                立 即 登 录
            </button>

            <div class="mt-4 text-center">
                <p class="text-secondary mb-0">还没有账号? <a href="/user/register" class="font-weight-bold" style="color: #0ea5e9; text-decoration: none;">免费注册</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 挂载验证码
        new PuzzleCaptcha('loginCaptcha', 'loginForm', 'loginSubmitBtn');
    });
</script>
{% endblock %}
